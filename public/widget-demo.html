<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Magaza - Modern Hali</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: #18181b;
        background: #fafafa;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid #e4e4e7;
        font-weight: 700;
        font-size: 18px;
      }
      .product {
        max-width: 960px;
        margin: 32px auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        padding: 0 24px;
      }
      .gallery {
        background: #ececef;
        border-radius: 16px;
        min-height: 380px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #71717a;
      }
      h1 { font-size: 26px; margin: 0 0 8px; }
      .price { font-size: 22px; font-weight: 700; margin: 12px 0; }
      .muted { color: #71717a; font-size: 14px; }
      .cart-form { margin-top: 24px; }
      .add-to-cart {
        width: 100%;
        padding: 14px 20px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: #ea580c;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .direct-ar {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 12px;
        padding: 12px 20px;
        width: 100%;
        font-size: 14px;
        font-weight: 600;
        color: #0f766e;
        text-decoration: none;
        background: #f0fdfa;
        border: 1px solid #0f766e;
        border-radius: 18px;
      }
      @media (max-width: 720px) {
        .product { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>Demo Magaza</header>

    <main class="product">
      <div class="gallery">Urun gorseli</div>

      <div class="info">
        <h1>Modern Hali - Krem</h1>
        <p class="muted">SKU: DEMO-160x230 • Salon Halisi</p>
        <div class="price">5.299 TL</div>
        <p class="muted">160 x 230 cm, makine halisi, kaymaz taban.</p>

        <form class="cart-form" onsubmit="return false;">
          <!-- Magazanin mevcut "Sepete Ekle" butonu -->
          <button type="submit" class="add-to-cart">Sepete Ekle</button>
          <!-- RugVision "Odamda Gor" butonu bu butonun hemen altina otomatik eklenecek -->
        </form>

        <!-- iPhone icin her zaman calisan dogrudan AR (Quick Look) baglantisi. -->
        <a
          rel="ar"
          href="/api/v1/ar/usdz/Modern_rug.usdz"
          class="direct-ar"
        >
          <img alt="" style="display:none" />
          iPhone'da dogrudan AR ile ac
        </a>
        <p class="muted" style="margin-top:8px">
          Not: iPhone &rarr; Safari, Android &rarr; Chrome onerilir.
        </p>
      </div>
    </main>

    <!--
      RugVision tek satir entegrasyon.
      data-rug-id: RugVision panelinden alinan urun ID'si.
      data-target: butonun yanina eklenecegi mevcut buton (opsiyonel).
    -->
    <script
      src="/widget.js?v=4"
      data-rug-id="cmqe1392j00044k8das08ajxr"
      data-target=".add-to-cart"
      data-position="after"
      defer
    ></script>
  </body>
</html>
