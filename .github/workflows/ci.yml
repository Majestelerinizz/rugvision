name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/rugvision_ci
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      STORAGE_DRIVER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Device matrix tests
        run: npm run test:device-matrix

      - name: Device matrix report
        run: npm run reports:device-matrix

      - name: Build
        run: npm run build

      - name: Upload device matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: device-matrix-report
          path: docs/reports/device-matrix-ar-*.csv
          if-no-files-found: ignore
